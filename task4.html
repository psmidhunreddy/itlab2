<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <title>Task 3 - AR/VR</title>
</head>
<body>
    <a-scene>

        <a-light type="ambient" color="#FFF8DC" intensity="0.4"></a-light>
        <a-entity vertical-move>
        <a-camera cursor="rayOrigin: mouse"></a-camera>
        </a-entity>
        <a-assets>
            <a-asset-item id="tv" src="./assets/wall_flat_tv/scene.gltf"></a-asset-item>
            <video id="myVideo" src="./assets/video.mp4" playsinline></video>
            <a-asset-item id="switch" src="./assets/light_switch/scene.gltf"></a-asset-item>
            <img id="scenery" src="./assets/scenery.jpg">
            <img id="carpet" src="./assets/carpet.jpg">
            <img id="sky" src="./assets/scenery.jpg">
            <img id="base" src="./assets/scenery - Copy.jpg">
            <img id="curtain" src="./assets/curtains.jpg">
            <img id="doorid" src="./assets/door1.png">
            <img id="image" src="./assets/curveimage.png">
            <img id="tree" src="./assets/tree.png">
            <a-asset-item id="sofa" src="./assets/sofa/scene.gltf"></a-asset-item>
            <a-asset-item id="ac" src="./assets/AC/scene.gltf"></a-asset-item>
        </a-assets>
        <a-sky src="#sky" radius="10" position="0 0 -10"></a-sky>
        <a-plane height="3" width="4" color="rgb(245, 222, 179)" position="0 1.5 -10" side="double">
            <a-entity gltf-model="#tv" scale="0.018 0.018 0.018" position="0 -0.28 0.13"></a-entity>
            <a-video src="#myVideo" width="1.69" height="0.95" position="0 -0.23 0.21"></a-video>
            <a-entity id="tvSwitch" gltf-model="#switch" scale="2 2 2" position="-0.09 -1.1 0.13"
                rotation="0 -90 0"></a-entity>
            <a-entity id="lightSwitchf" gltf-model="#switch" scale="2 2 2" position="0.05 -1.1 0.13"
                rotation="0 -90 0"></a-entity>
            <a-entity id="lightSwitchb" gltf-model="#switch" scale="2 2 2" position="0.19 -1.1 0.13"
                rotation="0 -90 0"></a-entity>
            <a-box width="4" height="0.15" depth="0.025" color="#D9D9D9" position="0 -1.5 0.01"></a-box>
            <a-entity line="start: -1.5 -2 0.01; end: 1.5 -2 0.01; color: rgb(196, 178, 143)"
                rotation="0 0 90"></a-entity>
            <a-entity line="start: -1.5 2 0.01; end: 1.5 2 0.01; color: rgb(196, 178, 143)"
                rotation="0 0 90"></a-entity>
        </a-plane>

        <a-plane height="3" width="4" color="rgb(245, 222, 179)" position="0 1.5 -7" side="double">
            <a-box width="4" height="0.15" depth="0.025" color="#D9D9D9" position="0 -1.5 0.01"></a-box>
            <a-entity line="start: -1.5 -2 -0.01; end: 1.5 -2 -0.01; color: rgb(196, 178, 143)" rotation="0 0 90"></a-entity>
            <a-entity line="start: -1.5 2 -0.01; end: 1.5 2 -0.01; color: rgb(196, 178, 143)" rotation="0 0 90"></a-entity>
            <a-entity gltf-model="#ac" scale="0.14, 0.14, 0.14" position="0 0.8 0.1" color="white" rotation="0 180 0"></a-entity>
            <a-entity gltf-model="#sofa" scale="0.085 0.07 .07" rotation="0 180 0" position="-0.25 -1.5 -2.48"></a-entity>
            <a-image src="#tree" position="0 -0.2 0.01" height="3" width="3"></a-image>
            <a-text value="Welcome" position="-0.5 1.3 0.01"></a-text>
            <a-text value="This way ---->" position="1.3 1 0.01" scale="0.5 0.5 0.5"></a-text>
        </a-plane>

        <a-entity height="3" width="3" color="white" position="-2 1.5 -8.5" rotation="0 90 0">
            <a-plane height="0.75" width="3" position="0 1.15 0" color="rgb(245, 222, 179)" side="double"></a-plane>
            <a-plane height="0.75" width="3" position="0 -1.15 0" color="rgb(245, 222, 179)" side="double"></a-plane>
            <a-plane height="0.25" width="3" position="-1.40 0 0" color="rgb(245, 222, 179)" rotation="0 0 90" side="double"></a-plane>
            <a-plane height="0.25" width="3" position="1.40 0 0" color="rgb(245, 222, 179)" rotation="0 0 90" side="double"></a-plane>
            <a-box width="3" height="0.15" depth="0.025" color="#D9D9D9" position="0 -1.5 0.01"></a-box>
            <a-plane id="leftCurtain" class="curtain1" position="-0.7 0 0.01" width="1.4" height="1.8" src="#curtain" material="side:double"></a-plane>
            <a-plane id="rightCurtain" class="curtain" position="+0.7 0 0.01" width="1.4" height="1.8" src="#curtain" material="side:double"></a-plane>
        </a-entity>
        <a-entity height="3" width="3" position="+2 1.5 -8.5" rotation="0 -90 0">
            <a-box width="1.8" height="0.15" depth="0.025" color="#D9D9D9" position="0.6 -1.5 0.01"></a-box>
            <a-box width="0.3" height="0.15" depth="0.025" color="#D9D9D9" position="-1.35 -1.5 0.01"></a-box>
            <a-plane height="3" width="1.8" color="rgb(245, 222, 179)" side="double" position="0.6 0 0"></a-plane>
            <a-plane height="3" width="0.3" color="rgb(245, 222, 179)" side="double" position="-1.35 0 0"></a-plane>
            <a-plane height="1" width="0.9" color="rgb(245, 222, 179)" position="-0.75 1 0" color="rgb(245, 222, 179)" rotation="0 0 0" side="double"></a-plane>
            <a-plane id="door" src="#doorid" height="2" width="0.9" position="-0.75 -0.5 0" color="rgb(245, 222, 179)" rotation="0 0 0" side="double"></a-plane>
            <a-text position="-0.2 0 +0.01" value="Task 3 - VR Web Page\nName: Midhun\nReg No:25MCMT15\n" scale="0.2 0.2 0.2"></a-text>
        </a-entity>
        <a-plane src="#carpet" height="3" width="4" position="0 0 -8.5" material="roughness:1; metalness:0;" rotation="90 0 0" side="double">
        </a-plane>
        <a-cylinder position="0 -0.2 -10" src="#base" radius="10" height="0" theta-start="0" theta-length="360" segments-radial="36" rotation="0 0 0"></a-cylinder>
        <a-plane height="3" width="4" color="pink" position="0 3 -8.5" rotation="90 0 0" side="double">
            <a-light id="light1" position="1 0.75 0.5" type="point" color="#ffffff" intensity="0" distance="10"></a-light>
            <a-light id="light2" position="-1 0.75 0.5" type="point" color="#ffffff" intensity="0" distance="10"></a-light>
            <a-light id="light3" position="1 -0.75 0.5" type="point" color="#ffffff" intensity="0" distance="10"></a-light>
            <a-light id="light4" position="-1 -0.75 0.5" type="point" color="#ffffff" intensity="0" distance="10"></a-light>
        </a-plane>

    </a-scene>
</body>
<script>
    AFRAME.registerComponent('toggle-switchtv', {
        init: function () {
            this.isOn=false;
            this.el.addEventListener('model-loaded', () => {
                this.switchPart=this.el.getObject3D('mesh').getObjectByName('Switch001_lightswitch_0');
                console.log(this.switchPart);

            });

            this.el.addEventListener('click', () => {
                const mesh=this.el.getObject3D('mesh');
                if (!this.switchPart) return;
                this.isOn=!this.isOn;
                console.log(this.isOn);
                if (this.isOn) {
                    this.switchPart.rotation.x=THREE.MathUtils.degToRad(180);
                    this.switchPart.position.z=this.switchPart.position.z - 0.001;
                    document.getElementById("myVideo").play();

                } else {
                    this.switchPart.rotation.x=this.switchPart.rotation.x + THREE.MathUtils.degToRad(-180);
                    this.switchPart.position.z=this.switchPart.position.z + 0.001;
                    const video=document.getElementById("myVideo");
                    video.currentTime=190;
                    video.play();
                }
            });
        }
    });
    AFRAME.registerComponent('toggle-lightb', {
        init: function () {
            this.isOn=false;

            this.el.addEventListener('model-loaded', () => {
                this.switchPart=this.el.getObject3D('mesh').getObjectByName('Switch001_lightswitch_0');
            });
            this.el.addEventListener('click', () => {
                if (!this.switchPart) return;
                this.isOn=!this.isOn;
                const l1=document.querySelector('#light1');
                const l2=document.querySelector('#light2');
                if (this.isOn) {
                    this.switchPart.rotation.x=THREE.MathUtils.degToRad(180);
                    this.switchPart.position.z -= 0.001;
                    l1.setAttribute('intensity', 2);
                    l2.setAttribute('intensity', 2);
                } else {
                    this.switchPart.rotation.x += THREE.MathUtils.degToRad(-180);
                    this.switchPart.position.z += 0.001;
                    l1.setAttribute('intensity', 0);
                    l2.setAttribute('intensity', 0);
                }
            });
        }
    });
    AFRAME.registerComponent('toggle-lightf', {
        init: function () {
            this.isOn=false;
            this.el.addEventListener('model-loaded', () => {
                this.switchPart=this.el.getObject3D('mesh').getObjectByName('Switch001_lightswitch_0');
            });
            this.el.addEventListener('click', () => {
                if (!this.switchPart) return;
                this.isOn=!this.isOn;
                const l3=document.querySelector('#light3');
                const l4=document.querySelector('#light4');
                if (this.isOn) {
                    this.switchPart.rotation.x=THREE.MathUtils.degToRad(180);
                    this.switchPart.position.z -= 0.001;
                    l3.setAttribute('intensity', 2);
                    l4.setAttribute('intensity', 2);
                } else {
                    this.switchPart.rotation.x += THREE.MathUtils.degToRad(-180);
                    this.switchPart.position.z += 0.001;
                    l3.setAttribute('intensity', 0);
                    l4.setAttribute('intensity', 0);
                }
            });
        }
    });


    AFRAME.registerComponent('toogle-curtain', {
        init: function () {
            let isOpen=false;
            this.el.addEventListener('click', () => {
                console.log("Hello");
                const left=document.querySelector('#leftCurtain');
                const right=document.querySelector('#rightCurtain');
                if (!isOpen) {
                    left.setAttribute('animation__pos', 'property: position; to: -1.2 0 0.01; dur:1000; easing:easeOutQuad');
                    left.setAttribute('animation__scale', 'property: scale; to: 0.3 1 1; dur:1000; easing:easeOutQuad');
                    right.setAttribute('animation__pos', 'property: position; to: 1.2 0 0.01; dur:1000; easing:easeOutQuad');
                    right.setAttribute('animation__scale', 'property: scale; to: 0.3 1 1; dur:1000; easing:easeOutQuad');
                } else {

                    left.setAttribute('animation__pos', 'property: position; to: -0.7 0 0.01; dur:1000; easing:easeOutQuad');
                    left.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur:1000; easing:easeOutQuad');

                    right.setAttribute('animation__pos', 'property: position; to: 0.7 0 0.01; dur:1000; easing:easeOutQuad');
                    right.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur:1000; easing:easeOutQuad');
                }
                isOpen=!isOpen;
            });
        }
    });
    AFRAME.registerComponent('toogle-door', {
        init: function () {
            let isOpen=false;
            this.el.addEventListener('click', () => {
                const door=document.querySelector('#door');
                if (!isOpen) {
                    door.setAttribute('animation__pos', 'property: position; to: -1.2 -0.5 -0.45; dur:1000; easing:easeOutQuad');
                    door.setAttribute('animation__rotate', 'property: rotation; to: 0 90 0; dur:1000; easing:easeOutQuad');
                }
                else {
                    door.setAttribute('animation__pos', 'property: position; to: -0.75 -0.5 0; dur:1000; easing:easeOutQuad');
                    door.setAttribute('animation__rotate', 'property: rotation; to: 0 0 0; dur:1000; easing:easeOutQuad');
                }
                isOpen=!isOpen;
            })
        }
    });
    AFRAME.registerComponent('vertical-move',{
        init:function(){
            this.keys={};
            window.addEventListener('keydown',e=>this.keys[e.code]=true);
            window.addEventListener('keyup',e=>this.keys[e.code]=false);
        },
        tick: function(){
        const pos=this.el.object3D.position;
        if (this.keys['Digit1']) pos.y+=0.1;
        if (this.keys['Digit0']) pos.y-=0.1;
 
        }
    });
    document.querySelector('#tvSwitch').setAttribute('toggle-switchtv', '');
    document.querySelector('#lightSwitchf').setAttribute('toggle-lightf', '');
    document.querySelector('#lightSwitchb').setAttribute('toggle-lightb', '');
    document.querySelector('.curtain').setAttribute('toogle-curtain', '');
    document.querySelector('.curtain1').setAttribute('toogle-curtain', '');
    document.querySelector('#door').setAttribute('toogle-door', '');

</script>

</html>
